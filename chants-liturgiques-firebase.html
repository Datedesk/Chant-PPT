        const firebaseConfig = {

        // Vérifier si Firebase est configuré
        const isFirebaseConfigured = firebaseConfig.apiKey !== "VOTRE_API_KEY";

        // ============================================
        let db = null;

        if (isFirebaseConfigured) {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();

        }

        // ============================================

Christ est ressuscité, alléluia !

            {

                titre: 'Notre Père',

            {

                paroles: `Je vous salue Marie, pleine de grâce,
Le Seigneur est avec vous,

            },
            {
                id: '4',
                titre: 'Gloire à Dieu',
                categorie: 'Ordinaire',
                auteur: 'Liturgie',
                paroles: `Gloire à Dieu au plus haut des cieux,
Et paix sur la terre aux hommes qu'il aime.

Nous te louons, nous te bénissons, nous t'adorons,
Nous te glorifions, nous te rendons grâce,
Pour ton immense gloire,

Seigneur Dieu, Agneau de Dieu, le Fils du Père,
Toi qui enlèves le péché du monde,
Prends pitié de nous.

            },
            {
                id: '5',
                titre: 'Agneau de Dieu',
                categorie: 'Ordinaire',
                auteur: 'Liturgie',
                paroles: `Agneau de Dieu, qui enlèves le péché du monde,
Prends pitié de nous.

Agneau de Dieu, qui enlèves le péché du monde,
Prends pitié de nous.

Agneau de Dieu, qui enlèves le péché du monde,
Donne-nous la paix.`
            }
        ];

        const CATEGORIES = [
            'Tous',
            'Entrée',
            'Offertoire',
            'Communion',
            'Sortie',
            'Pâques',
            'Noël',
            'Avent',
            'Carême',
            'Pentecôte',
            'Prière',
            'Prière Mariale',
            'Ordinaire',
            'Psaume',
            'Alléluia',
            'Autre'
        ];

        // ============================================
        // APPLICATION
        // ============================================
        class ChantsApp {
            constructor() {
                this.chants = [];
                this.selectedChants = [];
                this.searchTerm = '';
                this.categoryFilter = 'Tous';
                this.sortBy = 'titre';
                this.showAddModal = false;
                this.showEditModal = false;
                this.editingChant = null;
                this.isGenerating = false;
                this.isLoading = true;
                this.lastSync = null;
                this.connectionStatus = 'connecting';

                this.init();
            }

            async init() {
                if (!isFirebaseConfigured) {
                    this.isLoading = false;
                    this.connectionStatus = 'error';
                    this.render();
                    return;
                }

                try {
                    // Écouter les changements en temps réel
                    chantsRef.on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            this.chants = Object.values(data);
                        } else {
                            // Initialiser avec les chants d'exemple
                            this.initializeDatabase();
                        }
                        this.lastSync = new Date();
                        this.connectionStatus = 'connected';
                        this.isLoading = false;
                        this.render();
                    });

                    // Détecter les erreurs de connexion
                    const connectedRef = db.ref('.info/connected');
                    connectedRef.on('value', (snap) => {
                        if (snap.val() === true) {
                            this.connectionStatus = 'connected';
                        } else {
                            this.connectionStatus = 'disconnected';
                        }
                        this.render();
                    });

                } catch (error) {
                    console.error('Erreur Firebase:', error);
                    this.connectionStatus = 'error';
                    this.isLoading = false;
                    this.render();
                }
            }

            async initializeDatabase() {
                try {
                    const updates = {};
                    INITIAL_CHANTS.forEach(chant => {
                        updates[chant.id] = chant;
                    });
                    await chantsRef.update(updates);
                } catch (error) {
                    console.error('Erreur initialisation:', error);
                }
            }

            async addChant(chantData) {
                const chant = {
                    ...chantData,
                    id: Date.now().toString()
                };
                try {
                    await chantsRef.child(chant.id).set(chant);
                    this.showAddModal = false;
                    this.render();
                } catch (error) {
                    console.error('Erreur ajout:', error);
                    alert('❌ Erreur lors de l\'ajout du chant');
                }
            }

            handleEditChant(chantId) {
                const chant = this.chants.find(c => c.id === chantId);
                if (chant) {
                    this.editingChant = { ...chant };
                    this.showEditModal = true;
                    this.render();
                }
            }

            async updateChant(chantData) {
                try {
                    await chantsRef.child(this.editingChant.id).update(chantData);
                    this.showEditModal = false;
                    this.editingChant = null;
                    this.render();
                } catch (error) {
                    console.error('Erreur modification:', error);
                    alert('❌ Erreur lors de la modification du chant');
                }
            }

            async deleteChant(chantId) {
                if (!confirm('Êtes-vous sûr de vouloir supprimer ce chant ? Cette action est irréversible.')) {
                    return;
                }
                try {
                    await chantsRef.child(chantId).remove();
                    this.selectedChants = this.selectedChants.filter(id => id !== chantId);
                    this.render();
                } catch (error) {
                    console.error('Erreur suppression:', error);
                    alert('❌ Erreur lors de la suppression');
                }
            }

            toggleChantSelection(chantId) {
                if (this.selectedChants.includes(chantId)) {
                    this.selectedChants = this.selectedChants.filter(id => id !== chantId);
                } else {
                    this.selectedChants.push(chantId);
                }
                this.render();
            }

            removeFromSelection(chantId) {
                this.selectedChants = this.selectedChants.filter(id => id !== chantId);
                this.render();
            }

            getFilteredChants() {
                let filtered = [...this.chants];

                // Filtre par catégorie
                if (this.categoryFilter !== 'Tous') {
                    filtered = filtered.filter(c => c.categorie === this.categoryFilter);
                }

                // Filtre par recherche
                if (this.searchTerm) {
                    const term = this.searchTerm.toLowerCase();
                    filtered = filtered.filter(c =>
                        c.titre.toLowerCase().includes(term) ||
                        c.auteur.toLowerCase().includes(term) ||
                        c.categorie.toLowerCase().includes(term)
                    );
                }

                // Tri
                filtered.sort((a, b) => {
                    if (this.sortBy === 'titre') {
                        return a.titre.localeCompare(b.titre);
                    } else if (this.sortBy === 'categorie') {
                        return a.categorie.localeCompare(b.categorie);
                    } else if (this.sortBy === 'auteur') {
                        return a.auteur.localeCompare(b.auteur);
                    }
                    return 0;
                });

                return filtered;
            }

            getCategories() {
                const cats = new Set(this.chants.map(c => c.categorie));
                return ['Tous', ...Array.from(cats).sort()];
            }

            async generatePPT() {
                if (this.selectedChants.length === 0) return;

                this.isGenerating = true;
                this.render();

                try {
                    // Vérifier que PptxGenJS est disponible
                    if (typeof PptxGenJS === 'undefined') {
                        throw new Error('La bibliothèque PptxGenJS n\'est pas chargée. Vérifiez votre connexion Internet.');
                    }

                    // Récupérer le modèle sélectionné
                    const modeleSelect = document.getElementById('modeleSelect');
                    const modele = modeleSelect ? modeleSelect.value : 'mazan';
                    
                    // Configuration selon le modèle
                    const config = {
                        mazan: {
                            fontSize: 40,
                            name: 'Mazan'
                        },
                        caromb: {
                            fontSize: 55,
                            name: 'Caromb'
                        }
                    };
                    
                    const currentConfig = config[modele];
                    console.log('Génération avec modèle:', modele, currentConfig);

                    const pptx = new PptxGenJS();

                    // Configuration de base - FORMAT 4:3
                    pptx.layout = 'LAYOUT_4x3';
                    pptx.author = 'Paroisse Notre-Dame du Ventoux';
                    pptx.subject = `Chants Liturgiques - ${currentConfig.name}`;
                    pptx.title = `Chants Liturgiques - ${currentConfig.name}`;

                    const BLACK = '000000';
                    const WHITE = 'FFFFFF';

                    // Ajouter chaque chant sélectionné
                    const chantsToAdd = this.selectedChants
                        .map(id => this.chants.find(c => c.id === id))
                        .filter(Boolean);

                    for (const chant of chantsToAdd) {
                        console.log('Traitement du chant:', chant.titre);
                        
                        // DIAPO NOIRE au début du chant
                        const blackSlide1 = pptx.addSlide();
                        blackSlide1.background = { color: BLACK };

                        // Parser les paroles pour séparer refrain et couplets
                        const paragraphs = chant.paroles.split('\n\n').map(p => p.trim()).filter(p => p);
                        let refrain = [];
                        let couplets = [];
                        
                        for (let paragraph of paragraphs) {
                            // Détecter si c'est un couplet (commence par un numéro)
                            const coupletMatch = paragraph.match(/^(\d+)[–\-\.\)]\s*(.*)/s);
                            
                            if (coupletMatch) {
                                // C'est un couplet
                                const numero = coupletMatch[1];
                                const text = paragraph.replace(/^\d+[–\-\.\)]\s*/, '').trim();
                                couplets.push({
                                    numero: numero,
                                    text: text
                                });
                            } else if (paragraph.length > 0) {
                                // C'est le refrain (paragraphe sans numéro)
                                refrain.push(paragraph);
                            }
                        }
                        
                        // Le refrain est le texte sans numéro (généralement le plus court ou répété)
                        const refrainText = refrain.join('\n\n');

                        console.log('Refrain trouvé:', refrainText.substring(0, 50) + '...');
                        console.log('Nombre de couplets:', couplets.length);

                        // Structure : Refrain → Couplet 1 → Refrain → Couplet 2 → Refrain → etc.
                        
                        // SLIDE REFRAIN au début
                        if (refrainText) {
                            const refrainSlide = pptx.addSlide();
                            refrainSlide.background = { color: BLACK };
                            refrainSlide.addText(refrainText, {
                                x: 0.5,
                                y: 0.5,
                                w: 9,
                                h: 6.5,
                                fontSize: currentConfig.fontSize,
                                color: WHITE,
                                bold: true,
                                align: 'center',
                                valign: 'middle',
                                fontFace: 'Calibri'
                            });
                        }

                        // Pour chaque couplet : Couplet → Refrain
                        for (const couplet of couplets) {
                            // SLIDE COUPLET
                            const coupletSlide = pptx.addSlide();
                            coupletSlide.background = { color: BLACK };
                            coupletSlide.addText(couplet.text, {
                                x: 0.5,
                                y: 0.5,
                                w: 9,
                                h: 6.5,
                                fontSize: currentConfig.fontSize,
                                color: WHITE,
                                bold: true,
                                align: 'center',
                                valign: 'middle',
                                fontFace: 'Calibri'
                            });

                            // SLIDE REFRAIN après chaque couplet
                            if (refrainText) {
                                const refrainSlide = pptx.addSlide();
                                refrainSlide.background = { color: BLACK };
                                refrainSlide.addText(refrainText, {
                                    x: 0.5,
                                    y: 0.5,
                                    w: 9,
                                    h: 6.5,
                                    fontSize: currentConfig.fontSize,
                                    color: WHITE,
                                    bold: true,
                                    align: 'center',
                                    valign: 'middle',
                                    fontFace: 'Calibri'
                                });
                            }
                        }

                        // DIAPO NOIRE à la fin du chant
                        const blackSlide2 = pptx.addSlide();
                        blackSlide2.background = { color: BLACK };
                    }

                    // Générer le fichier
                    const fileName = `Chants_${currentConfig.name}_${new Date().toISOString().split('T')[0]}.pptx`;
                    
                    console.log('Début de la génération du fichier...');
                    await pptx.writeFile({ fileName: fileName });
                    console.log('Fichier généré avec succès !');

                    alert(`✅ Présentation générée avec succès !\n\nModèle : ${currentConfig.name}\nFormat : 4:3\nStructure : Refrain/Couplet alternés\nFichier : ${fileName}`);
                } catch (error) {
                    console.error('Erreur détaillée:', error);
                    let errorMessage = '❌ Erreur lors de la génération de la présentation.\n\n';
                    
                    if (error.message) {
                        errorMessage += 'Détail: ' + error.message;
                    } else {
                        errorMessage += 'Veuillez vérifier:\n';
                        errorMessage += '- Que vous êtes connecté à Internet\n';
                        errorMessage += '- Que votre navigateur autorise les téléchargements\n';
                        errorMessage += '- La structure des paroles (refrain sans numéro, couplets avec numéro)';
                    }
                    
                    alert(errorMessage);
                } finally {
                    this.isGenerating = false;
                    this.render();
                }
            }

            render() {
                const app = document.getElementById('app');
                
                if (!isFirebaseConfigured) {
                    app.innerHTML = this.renderConfigNotice();
                    return;
                }

                if (this.isLoading) {
                    app.innerHTML = this.renderLoading();
                    return;
                }

                app.innerHTML = this.renderApp();
                this.attachEventListeners();
            }

            renderConfigNotice() {
                return `
                    <div class="app-container">
                        <div class="config-notice">
                            <h3>⚙️ Configuration Firebase requise</h3>
                            <p style="margin-bottom: 1rem;">
                                Pour utiliser cette application avec une base de données partagée, vous devez configurer Firebase.
                            </p>
                            <ol style="margin-left: 1.5rem; margin-bottom: 1rem;">
                                <li>Créez un projet Firebase sur <a href="https://console.firebase.google.com" target="_blank" style="color: #1e3a5f; font-weight: 600;">console.firebase.google.com</a></li>
                                <li>Activez "Realtime Database"</li>
                                <li>Copiez votre configuration Firebase</li>
                                <li>Remplacez les valeurs dans le fichier HTML (lignes 486-493)</li>
                            </ol>
                            <p>
                                <strong>Instructions détaillées :</strong> Consultez le fichier <code>INSTRUCTIONS_FIREBASE.md</code> inclus.
                            </p>
                        </div>
                    </div>
                `;
            }

            renderLoading() {
                return `
                    <div class="app-container">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Connexion à la base de données...</p>
                        </div>
                    </div>
                `;
            }

            renderApp() {
                const filteredChants = this.getFilteredChants();
                const categories = this.getCategories();
                const selectedChantsData = this.selectedChants
                    .map(id => this.chants.find(c => c.id === id))
                    .filter(Boolean);

                return `
                    <div class="app-container">
                        ${this.renderHeader()}
                        ${this.renderStats(categories)}
                        
                        <div class="main-grid">
                            ${this.renderBibliothèque(filteredChants, categories)}
                            ${this.renderSelection(selectedChantsData)}
                        </div>

                        ${this.renderSyncIndicator()}
                        ${this.showAddModal ? this.renderAddModal() : ''}
                        ${this.showEditModal ? this.renderEditModal() : ''}
                    </div>
                `;
            }

            renderHeader() {
                return `
                    <header class="header">
                        <h1>🎵 Gestionnaire de Chants Liturgiques</h1>
                        <p>Base de données partagée en ligne</p>
                        <div class="cloud-badge">
                            ☁️ Firebase • Accessible à toute l'équipe
                        </div>
                    </header>
                `;
            }

            renderStats(categories) {
                return `
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value">${this.chants.length}</div>
                            <div class="stat-label">Chants disponibles</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${this.selectedChants.length}</div>
                            <div class="stat-label">Chants sélectionnés</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${categories.length - 1}</div>
                            <div class="stat-label">Catégories</div>
                        </div>
                    </div>
                `;
            }

            renderBibliothèque(filteredChants, categories) {
                return `
                    <div class="panel">
                        <h2 class="panel-title">📚 Bibliothèque de Chants</h2>

                        <div class="controls">
                            <input
                                type="text"
                                class="search-box"
                                placeholder="🔍 Rechercher un chant..."
                                value="${this.searchTerm}"
                                id="searchInput"
                            />
                            <select class="filter-select" id="categoryFilter">
                                ${categories.map(cat => `
                                    <option value="${cat}" ${cat === this.categoryFilter ? 'selected' : ''}>
                                        ${cat}
                                    </option>
                                `).join('')}
                            </select>
                            <select class="filter-select" id="sortSelect">
                                <option value="titre" ${this.sortBy === 'titre' ? 'selected' : ''}>Trier par titre</option>
                                <option value="categorie" ${this.sortBy === 'categorie' ? 'selected' : ''}>Trier par catégorie</option>
                                <option value="auteur" ${this.sortBy === 'auteur' ? 'selected' : ''}>Trier par auteur</option>
                            </select>
                            <button class="btn btn-accent" id="addChantBtn">
                                ➕ Nouveau chant
                            </button>
                            <button class="btn btn-primary" id="refreshBtn" title="Actualiser">
                                🔄
                            </button>
                        </div>

                        ${filteredChants.length === 0 ? `
                            <div class="empty-state">
                                <div class="empty-state-icon">🎼</div>
                                <p>Aucun chant trouvé</p>
                            </div>
                        ` : `
                            <div class="chants-list">
                                ${filteredChants.map(chant => `
                                    <div class="chant-item ${this.selectedChants.includes(chant.id) ? 'selected' : ''}"
                                         data-chant-id="${chant.id}">
                                        <input
                                            type="checkbox"
                                            class="checkbox chant-checkbox"
                                            ${this.selectedChants.includes(chant.id) ? 'checked' : ''}
                                            data-chant-id="${chant.id}"
                                        />
                                        <div class="chant-info">
                                            <div class="chant-title">${chant.titre}</div>
                                            <div class="chant-meta">
                                                <span class="chant-category">${chant.categorie}</span>
                                                ${chant.auteur}
                                            </div>
                                        </div>
                                        <div class="action-buttons">
                                            <button class="action-btn edit-btn" data-edit-id="${chant.id}" title="Modifier">
                                                ✏️
                                            </button>
                                            <button class="action-btn delete" data-delete-id="${chant.id}" title="Supprimer">
                                                🗑️
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `}
                    </div>
                `;
            }

            renderSelection(selectedChantsData) {
                return `
                    <div class="selection-panel">
                        <div class="panel">
                            <h2 class="panel-title">✅ Sélection</h2>

                            <div class="selected-count">
                                ${this.selectedChants.length} ${this.selectedChants.length > 1 ? 'chants sélectionnés' : 'chant sélectionné'}
                            </div>

                            <div style="margin-bottom: 1rem; padding: 1rem; background: #f3f4f6; border-radius: 0.5rem;">
                                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text);">
                                    📍 Modèle de présentation
                                </label>
                                <select id="modeleSelect" class="form-input" style="width: 100%;">
                                    <option value="mazan">Église de Mazan (Police 40)</option>
                                    <option value="caromb">Église de Caromb (Police 55)</option>
                                </select>
                            </div>

                            ${selectedChantsData.length > 0 ? `
                                <div class="selected-list">
                                    ${selectedChantsData.map((chant, index) => `
                                        <div class="selected-item">
                                            <div>
                                                <strong>${index + 1}.</strong> ${chant.titre}
                                            </div>
                                            <button class="remove-btn" data-remove-id="${chant.id}">×</button>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}

                            <button
                                class="btn btn-success"
                                style="width: 100%"
                                id="generatePPTBtn"
                                ${this.selectedChants.length === 0 || this.isGenerating ? 'disabled' : ''}
                            >
                                ${this.isGenerating ? `
                                    <div class="spinner" style="width: 20px; height: 20px; margin: 0"></div>
                                    Génération...
                                ` : '📊 Générer le PowerPoint'}
                            </button>

                            ${this.selectedChants.length > 0 ? `
                                <button
                                    class="btn btn-primary"
                                    style="width: 100%; margin-top: 0.5rem"
                                    id="clearSelectionBtn"
                                >
                                    🗑️ Tout désélectionner
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            renderSyncIndicator() {
                if (!this.lastSync) return '';

                const statusText = {
                    'connected': 'Connecté',
                    'disconnected': 'Déconnecté',
                    'connecting': 'Connexion...',
                    'error': 'Erreur de connexion'
                };

                return `
                    <div class="sync-indicator">
                        <div class="sync-dot ${this.connectionStatus !== 'connected' ? 'error' : ''}"></div>
                        ${statusText[this.connectionStatus]} • ${this.lastSync.toLocaleTimeString('fr-FR')}
                    </div>
                `;
            }

            renderAddModal() {
                return `
                    <div class="modal" id="addModal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h2 class="modal-title">➕ Ajouter un nouveau chant</h2>
                                <button class="close-btn" id="closeModalBtn">×</button>
                            </div>

                            <form id="addChantForm">
                                <div class="form-group">
                                    <label class="form-label">Titre *</label>
                                    <input type="text" class="form-input" id="titreInput" required />
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Catégorie</label>
                                    <select class="form-input" id="categorieInput">
                                        ${CATEGORIES.filter(c => c !== 'Tous').map(cat => `
                                            <option value="${cat}">${cat}</option>
                                        `).join('')}
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Auteur</label>
                                    <input type="text" class="form-input" id="auteurInput" />
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Paroles *</label>
                                    <textarea
                                        class="form-input form-textarea"
                                        id="parolesInput"
                                        required
                                        placeholder="Copiez les paroles complètes du chant ici..."
                                    ></textarea>
                                </div>

                                <div class="form-actions">
                                    <button type="button" class="btn btn-primary" id="cancelFormBtn">
                                        Annuler
                                    </button>
                                    <button type="submit" class="btn btn-success">
                                        ✅ Ajouter le chant
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            renderEditModal() {
                if (!this.editingChant) return '';
                
                return `
                    <div class="modal" id="editModal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h2 class="modal-title">✏️ Modifier le chant</h2>
                                <button class="close-btn" id="closeEditModalBtn">×</button>
                            </div>

                            <form id="editChantForm">
                                <div class="form-group">
                                    <label class="form-label">Titre *</label>
                                    <input type="text" class="form-input" id="editTitreInput" value="${this.editingChant.titre}" required />
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Catégorie</label>
                                    <select class="form-input" id="editCategorieInput">
                                        ${CATEGORIES.filter(c => c !== 'Tous').map(cat => `
                                            <option value="${cat}" ${cat === this.editingChant.categorie ? 'selected' : ''}>${cat}</option>
                                        `).join('')}
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Auteur</label>
                                    <input type="text" class="form-input" id="editAuteurInput" value="${this.editingChant.auteur || ''}" />
                                </div>

                                <div class="form-group">
                                    <label class="form-label">Paroles *</label>
                                    <textarea
                                        class="form-input form-textarea"
                                        id="editParolesInput"
                                        required
                                        placeholder="Copiez les paroles complètes du chant ici..."
                                    >${this.editingChant.paroles}</textarea>
                                </div>

                                <div class="form-actions">
                                    <button type="button" class="btn btn-primary" id="cancelEditFormBtn">
                                        Annuler
                                    </button>
                                    <button type="submit" class="btn btn-success">
                                        ✅ Enregistrer les modifications
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
            }

            attachEventListeners() {
                // Recherche
                const searchInput = document.getElementById('searchInput');
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        this.searchTerm = e.target.value;
                        this.render();
                    });
                }

                // Filtres
                const categoryFilter = document.getElementById('categoryFilter');
                if (categoryFilter) {
                    categoryFilter.addEventListener('change', (e) => {
                        this.categoryFilter = e.target.value;
                        this.render();
                    });
                }

                const sortSelect = document.getElementById('sortSelect');
                if (sortSelect) {
                    sortSelect.addEventListener('change', (e) => {
                        this.sortBy = e.target.value;
                        this.render();
                    });
                }

                // Boutons principaux
                const addChantBtn = document.getElementById('addChantBtn');
                if (addChantBtn) {
                    addChantBtn.addEventListener('click', () => {
                        this.showAddModal = true;
                        this.render();
                    });
                }

                const refreshBtn = document.getElementById('refreshBtn');
                if (refreshBtn) {
                    refreshBtn.addEventListener('click', () => {
                        this.lastSync = new Date();
                        this.render();
                    });
                }

                // Sélection de chants
                document.querySelectorAll('.chant-checkbox').forEach(checkbox => {
                    checkbox.addEventListener('change', (e) => {
                        e.stopPropagation();
                        this.toggleChantSelection(e.target.dataset.chantId);
                    });
                });

                document.querySelectorAll('.chant-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        if (e.target.classList.contains('action-btn') || 
                            e.target.closest('.action-btn')) {
                            return;
                        }
                        this.toggleChantSelection(item.dataset.chantId);
                    });
                });

                // Suppression
                document.querySelectorAll('[data-delete-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteChant(btn.dataset.deleteId);
                    });
                });

                // Édition
                document.querySelectorAll('[data-edit-id]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.handleEditChant(btn.dataset.editId);
                    });
                });

                // Retrait de la sélection
                document.querySelectorAll('[data-remove-id]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.removeFromSelection(btn.dataset.removeId);
                    });
                });

                // Génération PPT
                const generatePPTBtn = document.getElementById('generatePPTBtn');
                if (generatePPTBtn) {
                    generatePPTBtn.addEventListener('click', () => {
                        this.generatePPT();
                    });
                }

                // Désélectionner tout
                const clearSelectionBtn = document.getElementById('clearSelectionBtn');
                if (clearSelectionBtn) {
                    clearSelectionBtn.addEventListener('click', () => {
                        this.selectedChants = [];
                        this.render();
                    });
                }

                // Modal
                const closeModalBtn = document.getElementById('closeModalBtn');
                if (closeModalBtn) {
                    closeModalBtn.addEventListener('click', () => {
                        this.showAddModal = false;
                        this.render();
                    });
                }

                const cancelFormBtn = document.getElementById('cancelFormBtn');
                if (cancelFormBtn) {
                    cancelFormBtn.addEventListener('click', () => {
                        this.showAddModal = false;
                        this.render();
                    });
                }

                const addModal = document.getElementById('addModal');
                if (addModal) {
                    addModal.addEventListener('click', (e) => {
                        if (e.target.id === 'addModal') {
                            this.showAddModal = false;
                            this.render();
                        }
                    });
                }

                const addChantForm = document.getElementById('addChantForm');
                if (addChantForm) {
                    addChantForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            titre: document.getElementById('titreInput').value,
                            categorie: document.getElementById('categorieInput').value,
                            auteur: document.getElementById('auteurInput').value,
                            paroles: document.getElementById('parolesInput').value
                        };
                        this.addChant(formData);
                    });
                }

                // Modal d'édition
                const closeEditModalBtn = document.getElementById('closeEditModalBtn');
                if (closeEditModalBtn) {
                    closeEditModalBtn.addEventListener('click', () => {
                        this.showEditModal = false;
                        this.editingChant = null;
                        this.render();
                    });
                }

                const cancelEditFormBtn = document.getElementById('cancelEditFormBtn');
                if (cancelEditFormBtn) {
                    cancelEditFormBtn.addEventListener('click', () => {
                        this.showEditModal = false;
                        this.editingChant = null;
                        this.render();
                    });
                }

                const editModal = document.getElementById('editModal');
                if (editModal) {
                    editModal.addEventListener('click', (e) => {
                        if (e.target.id === 'editModal') {
                            this.showEditModal = false;
                            this.editingChant = null;
                            this.render();
                        }
                    });
                }

                const editChantForm = document.getElementById('editChantForm');
                if (editChantForm) {
                    editChantForm.addEventListener('submit', (e) => {
                        e.preventDefault();
                        const formData = {
                            titre: document.getElementById('editTitreInput').value,
                            categorie: document.getElementById('editCategorieInput').value,
                            auteur: document.getElementById('editAuteurInput').value,
                            paroles: document.getElementById('editParolesInput').value
                        };
                        this.updateChant(formData);
                    });
                }
            }
        }

        // Démarrer l'application
        new ChantsApp();
    </script>
</body>
</html>
